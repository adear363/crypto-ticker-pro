<ion-header class="ion-no-border">
  <ion-toolbar style="--background: #0b0e11; color: white;">
    <ion-title style="font-weight: 700; letter-spacing: 0.5px;">Crypto Ticker Pro</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="fetchCryptoData()" [disabled]="isLoading">
        <ion-icon *ngIf="!isLoading" slot="icon-only" name="refresh-outline"></ion-icon>
        <ion-spinner *ngIf="isLoading" name="crescent" color="primary"></ion-spinner>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="dark-content">
  <div class="ion-padding">
    
    <ion-list lines="none" style="background: transparent;">
      <ion-card *ngFor="let coin of cryptoData" class="glass-card">
        <ion-item color="transparent">
          <ion-badge slot="start" class="rank-badge">{{ coin.rank }}</ion-badge>
          
          <ion-label>
            <h2 class="coin-name">{{ coin.name }}</h2>
            <p class="coin-symbol">{{ coin.symbol }}</p>
          </ion-label>

          <div slot="end" style="text-align: right;">
            <h2 class="coin-price">${{ coin.price_usd | number:'1.2-2' }}</h2>
            <p class="usd-label">USD</p>
          </div>
        </ion-item>
      </ion-card>
    </ion-list>

    <div *ngIf="cryptoData.length === 0 && !isLoading" class="empty-state">
      <p>Data belum dimuat. Klik refresh.</p>
    </div>

  </div>
</ion-content>
